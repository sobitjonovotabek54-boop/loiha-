<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurslar Portali</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'kurs_list' %}">E-Kurslar</a>
            <div>
                {% if user.is_authenticated %}
                    <span class="navbar-text mr-3 text-white">Salom, {{ user.username }}</span>
                    {% if user.teacher_profile %}
                        <a href="{% url 'kurs_add' %}" class="btn btn-success btn-sm mr-2">+ Kurs qo'shish</a>
                    {% endif %}
                    <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">Chiqish</a>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">Kirish</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="text-center py-4 my-4 border-top">
        <p class="text-muted">&copy; 2026 Kurs Loyihasi. Barcha huquqlar himoyalangan.</p>
    </footer>

</body>
</html>
